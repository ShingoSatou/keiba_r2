name: ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version-file: .python-version
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run ruff
        run: uv run ruff check .

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version-file: .python-version
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run pytest
        run: uv run pytest -q -s
